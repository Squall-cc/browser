<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Pulsar</title>
    <script src="./scramjet/scramjet.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        color: #fff;
        font:
          14px system-ui,
          sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      #bar {
        display: flex;
        padding: 6px 10px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
      }
      #bar input {
        flex: 1;
        background: #000;
        color: #fff;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 13px;
        outline: none;
      }
      #bar input:focus {
        border-color: #89b4fa;
      }
      #bar button {
        background: #000;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 6px 10px;
        margin-right: 6px;
        cursor: pointer;
      }
      #bar button svg {
        width: 14px;
        height: 14px;
        fill: #fff;
      }
      iframe {
        flex: 1;
        width: 100%;
        border: none;
        background: #111;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <button id="back" title="Back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg>
      </button>
      <button id="forward" title="Forward">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"/></svg>
      </button>
      <input
        id="url"
        type="text"
        placeholder="URL or search..."
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <iframe id="frame"></iframe>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
